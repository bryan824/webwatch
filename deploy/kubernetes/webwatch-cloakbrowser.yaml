apiVersion: v1
kind: Secret
metadata:
  name: webwatch-secrets
stringData:
  # Replace before applying. Leave WEBWATCH_API_TOKEN empty only if the service is not exposed.
  DISCORD_WEBHOOK_URL: "https://discord.com/api/webhooks/..."
  WEBWATCH_API_TOKEN: "change-me"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: webwatch-config
data:
  config.toml: |
    sqlite_path = "/data/webwatch.sqlite3"
    targets_path = "/app/targets.toml"
    user_agent = "webwatch/0.1 (+https://example.invalid; low-frequency page monitor)"

    [server]
    bind = "0.0.0.0:3000"

    [scheduler]
    default_interval_secs = 300
    jitter_secs = 30
    http_timeout_secs = 20

    [renderer]
    enabled = true
    backend = "cloakbrowser"
    endpoint = "http://127.0.0.1:9222"
    max_concurrency = 1
    navigation_timeout_ms = 30000
    operation_timeout_ms = 10000
    settle_ms = 750
  targets.toml: |
    [[targets]]
    id = "campfire-mug"
    name = "Campfire Mug"
    url = "https://example.com/products/campfire-mug"
    enabled = true

    [[targets.conditions]]
    kind = "text_appears"
    value = "Add to cart"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: webwatch-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webwatch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webwatch
  template:
    metadata:
      labels:
        app: webwatch
    spec:
      containers:
        - name: webwatch
          image: ghcr.io/YOUR_GITHUB_OWNER/webwatch:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: WEBWATCH_CONFIG
              value: /app/config.toml
            - name: RUST_LOG
              value: webwatch=info,tower_http=info
            - name: DISCORD_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: webwatch-secrets
                  key: DISCORD_WEBHOOK_URL
            - name: WEBWATCH_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: webwatch-secrets
                  key: WEBWATCH_API_TOKEN
          ports:
            - name: http
              containerPort: 3000
          volumeMounts:
            - name: config
              mountPath: /app/config.toml
              subPath: config.toml
              readOnly: true
            - name: config
              mountPath: /app/targets.toml
              subPath: targets.toml
              readOnly: true
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 60
        - name: cloakbrowser
          image: cloakhq/cloakbrowser:latest
          imagePullPolicy: IfNotPresent
          command:
            - cloakserve
            - --idle-timeout=300
          ports:
            - name: cdp
              containerPort: 9222
          readinessProbe:
            httpGet:
              path: /json/version
              port: cdp
            initialDelaySeconds: 10
            periodSeconds: 30
          livenessProbe:
            httpGet:
              path: /json/version
              port: cdp
            initialDelaySeconds: 30
            periodSeconds: 60
      volumes:
        - name: config
          configMap:
            name: webwatch-config
        - name: data
          persistentVolumeClaim:
            claimName: webwatch-data
---
apiVersion: v1
kind: Service
metadata:
  name: webwatch
spec:
  type: ClusterIP
  selector:
    app: webwatch
  ports:
    - name: http
      port: 3000
      targetPort: http
