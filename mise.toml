[env]
DISCORD_WEBHOOK_URL = { age = "" }
CARGO_TERM_COLOR = "always"

[tasks.check]
description = "cargo check"
run = "cargo check"

[tasks.check-all]
description = "cargo check --all-targets"
run = "cargo check --all-targets"

[tasks.clippy]
description = "cargo clippy"
run = "cargo clippy"

[tasks.clippy-all]
description = "cargo clippy --all-targets"
run = "cargo clippy --all-targets"

[tasks.pedantic]
description = "cargo clippy with clippy::pedantic"
run = "cargo clippy -- -W clippy::pedantic"

[tasks.test]
description = "cargo test"
run = "cargo test"

[tasks.nextest]
description = "cargo nextest run"
run = "cargo nextest run --hide-progress-bar --failure-output final"

[tasks.doc]
description = "cargo doc --no-deps"
run = "cargo doc --no-deps"

[tasks.doc-open]
description = "cargo doc --no-deps --open"
run = "cargo doc --no-deps --open"

[tasks.run]
description = "cargo run"
run = "cargo run"

[tasks.run-long]
description = "cargo run, intended to be restarted by mise watch"
run = "cargo run"
sources = [
  "src/**/*.rs",
  "templates/**/*",
  "migrations/**/*",
  "static/**/*",
  "Cargo.toml",
  "Cargo.lock",
  ".env",
]

[tasks.ex]
description = "cargo run --example <example>"
usage = 'arg "<example>" help="Example name"'
run = 'cargo run --example "${usage_example?}"'
